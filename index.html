<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Generator Pro - Chuẩn Hóa Cấu Trúc Hệ Thống</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0c0d0f; color: #d1d5db; margin: 40px; }
        .wrapper { max-width: 800px; margin: 0 auto; background: rgba(255, 255, 255, 0.03); border: 1px solid #334155; padding: 25px; border-radius: 12px; }
        h2 { color: #fbbf24; border-bottom: 1px solid #334155; padding-bottom: 10px; margin-top: 0; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: bold; margin-bottom: 6px; color: #94a3b8; font-size: 14px;}
        input[type="text"], select, textarea { width: 100%; padding: 10px; background: #000; color: #fbbf24; border: 1px solid #475569; border-radius: 6px; box-sizing: border-box; }
        select { color: #fff; cursor: pointer; }
        textarea { height: 130px; font-family: monospace; color: #fff; }
        button { background: #2563eb; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        button:hover { background: #1d4ed8; }
        .output-section { margin-top: 25px; display: none; }
        #codeResult { background: #000; color: #a7f3d0; padding: 15px; border-radius: 6px; border: 1px solid #059669; overflow-x: auto; white-space: pre-wrap; font-family: monospace; font-size: 13px; max-height: 450px; }
        .btn-copy-code { background: #6366f1; margin-bottom: 6px; }
        .preview-slug { font-size: 12px; color: #10b981; margin-top: 4px; display: block; }
    </style>
</head>
<body>

<div class="wrapper">
    <h2>🛠️ Bộ Tạo Lịch Học & Điểm Danh Tự Động Toàn Diện</h2>
    
    <div class="form-group">
        <label>1. Nhập Tên Thứ hiển thị (Ví dụ: THỨ 2, THỨ 5, THỨ 7...):</label>

    </div>

    <div class="form-group">
        <label>2. Thông tin Phiên học & Thời gian:</label>
        <input type="text" id="timeText" value="18:30 — PHIÊN HỌC" oninput="syncAllIDs()">
        <span class="preview-slug">👉 Mã ID Thời gian tự sinh: <strong id="timeIdPreview">t1830_thu-5</strong></span>
    </div>

    <div class="form-group">
        <label>3. Chọn Tên Lớp Học (Hệ thống tự nhận diện mã chữ):</label>
        <select id="classDropdown" onchange="syncAllIDs()">
            <option value="APOLLO_L5_YEN" data-name="APOLLO L5 - Yến">APOLLO L5 - Yến</option>
            <option value="APOLLO_L6_NAM" data-name="APOLLO L6 - Nam">APOLLO L6 - Nam</option>
            <option value="class1" data-name="LỚP A1">LỚP A1</option>
            <option value="class2" data-name="LỚP A2">LỚP A2</option>
            <option value="SVIP" data-name="SVIP - L4-7/Lê Thu Hà">SVIP - L4-7/Lê Thu Hà</option>
            <option value="SKY_KID" data-name="SKY - KID">SKY - KID</option>
            <option value="SMART_KID" data-name="SMART-KID">SMART-KID</option>
            <option value="CLOUDKID_MG1" data-name="CLOUD-KID MG+1">CLOUD-KID MG+1</option>
            <option value="OZON_L23_NGOHANG" data-name="OZON-L2+3/Ngô Hằng">OZON-L2+3/Ngô Hằng</option>
            <option value="MICKEY_L23_THIPHUONG" data-name="MICKEY - L2+3/Thị Phương">MICKEY - L2+3/Thị Phương</option>
            <option value="OXFORD_L4_THIPHUONG" data-name="OXFORD L4/Thu Phương">OXFORD L4/Thu Phương</option>
            <option value="QUEST_L4_THUPHUONG" data-name="QUEST - L4 Thu Phương">QUEST - L4 Thu Phương</option>
            <option value="CAMBRIDGE_L4_NHUNG" data-name="CAMBRIDGE - L4/Nhung">CAMBRIDGE - L4/Nhung</option>
            <option value="KING_L4_THUPHUONG" data-name="KING - L4/Thu Phương">KING - L4/Thu Phương</option>
            <option value="GALAXY_L4_MINHPHUONG" data-name="GALAXY - L4/Minh Phương">GALAXY - L4/Minh Phương</option>
            <option value="KIND_L5_TAN" data-name="KIND L5 - Tân">KIND L5 - Tân</option>
            <option value="LIKE_L5_THUPHUONG" data-name="LIKE L5-Thu Phương">LIKE L5-Thu Phương</option>
            <option value="SMILE_L6_HAAN" data-name="SMILE-L6-Hà An">SMILE-L6-Hà An</option>
            <option value="STAR_L6_THANHTHAO" data-name="STAR-L6-Thanh Thảo">STAR-L6-Thanh Thảo</option>
            <option value="GOOD_L6_HAAN" data-name="GOOD-L6-Hà An">GOOD-L6-Hà An</option>
            <option value="MARS_L6_NGOHANG" data-name="MARS - L6-Ngô Hằng">MARS - L6-Ngô Hằng</option>
            <option value="PARIS_L6_MINHPHUONG" data-name="PARIS-L6/Minh Phương">PARIS-L6/Minh Phương</option>
            <option value="EVIC" data-name="EVIC">EVIC</option>
            <option value="KID_L7_THANHTHAO" data-name="KID - L7- Thanh Thảo">KID - L7- Thanh Thảo</option>
            <option value="BOSS_VIP_L7_LETHUHA" data-name="BOSS-VIP - L7/Lê Thu Hà">BOSS-VIP - L7/Lê Thu Hà</option>
            <option value="MOON_L7_TRAMY" data-name="MOON-L7/Trà My">MOON-L7/Trà My</option>
            <option value="ILA_L7_THUHA" data-name="ILA-L7/Thu Hà">ILA-L7/Thu Hà</option>
            <option value="DELTA_L7_PHUONG" data-name="DELTA-L7/Phương">DELTA-L7/Phương</option>
            <option value="HAPPY_L8_MAILY" data-name="Happy - L8/Mai Ly">Happy - L8/Mai Ly</option>
            <option value="SUN_L8_MAILY" data-name="Sun - L8/Mai Ly">Sun - L8/Mai Ly</option>
            <option value="HIGH_L8_THUHA" data-name="High - L8/Thu Hà">High - L8/Thu Hà</option>
            <option value="HOPE_L8_TRAMY" data-name="HOPE-L8/TRÀ MY">HOPE-L8/TRÀ MY</option>
            <option value="BIG_L9_MAILY" data-name="BIG-L9/Mai Ly">BIG-L9/Mai Ly</option>
            <option value="SUPER_L9_THUHA" data-name="SUPER - L9/Thu Hà">SUPER - L9/Thu Hà</option>
            <option value="SEA_L9_THUHA" data-name="SEA - L9/Thu Hà">SEA - L9/Thu Hà</option>
            <option value="CLC_L9_THUHA" data-name="CLC-L9/Thu Hà">CLC-L9/Thu Hà</option>
            <option value="WIN_L10_THUHA" data-name="WIN - L10/Thu Hà">WIN - L10/Thu Hà</option>
            <option value="SMART_L10_HAAN" data-name="SMART - L10/Hà An">SMART - L10/Hà An</option>
            <option value="CLOUD_L10_HAAN" data-name="CLOUD - L10/Hà An">CLOUD - L10/Hà An</option>
            <option value="TRY_L10_THUHA" data-name="TRY - L10/Thu Hà">TRY - L10/Thu Hà</option>
            <option value="CAN_L11_LETHUHA" data-name="CAN - L11/Lê Thu Hà">CAN - L11/Lê Thu Hà</option>
            <option value="OCEAN_L11" data-name="OCEAN-L11">OCEAN-L11</option>
            <option value="OCE" data-name="OCE">OCE</option>
            <option value="VICTORYA" data-name="VICTORYA">VICTORYA</option>
            <option value="ATHENA_L12_MAILY" data-name="ATHENA-L12/Mai Ly">ATHENA-L12/Mai Ly</option>
            <option value="IELTS_WONDERFUL_THUHA" data-name="IELTS-WONDERFUL/Thu Hà">IELTS-WONDERFUL/Thu Hà</option>
            <option value="SPACEX" data-name="SPACEX">SPACEX</option>
            <option value="FUN_IE_L12_LETHUHA" data-name="FUN - IE-L12/Lê Thu Hà">FUN - IE-L12/Lê Thu Hà</option>
            <option value="IELTS_326" data-name="IELTS 3/26">IELTS 3/26</option>
            <option value="L12_BLUE" data-name="L12-BLUE">L12-BLUE</option>
            <option value="E1A_L12_LETHUHA" data-name="E1A - L12/ Lê Thu Hà">E1A - L12/ Lê Thu Hà</option>
        </select>
        <span class="preview-slug">👉 Mã ID Lớp đang chọn: <strong id="classIdPreview">APOLLO_L5_YEN</strong></span>
    </div>

    <div class="form-group">
        <label>4. Số thứ tự ID học sinh bắt đầu (Thường để là 1):</label>
        <input type="text" id="startIdNum" value="1" style="width: 100px;">
    </div>

    <div class="form-group">
        <label>5. Dán danh sách học sinh (Mỗi người 1 dòng: Tên - Số điện thoại):</label>
        <textarea id="rawList" placeholder="Hoàng Văn Đức	- 097 888 7766"></textarea>
    </div>

    <button onclick="generateMarkup()">⚡ Tạo Mã HTML Khớp Mẫu 100%</button>

    <div class="output-section" id="outputArea">
        <label>Kết quả mã HTML của bạn:</label>
        <button class="btn-copy-code" onclick="copyToClipboard()">📋 Copy Đoạn Mã</button>
        <pre id="codeResult"></pre>
    </div>
</div>

<script>
function convertToSlug(text) {
    let slug = text.toLowerCase();
    slug = slug.replace(/á|à|ả|ạ|ã|ă|ắ|ằ|ẳ|ẵ|ặ|â|ấ|ầ|ẩ|ẫ|ậ/g, "a");
    slug = slug.replace(/é|è|ẻ|ẽ|ẹ|ê|ế|ề|ể|ễ|ệ/g, "e");
    slug = slug.replace(/i|í|ì|ỉ|ĩ|ị/g, "i");
    slug = slug.replace(/ó|ò|ỏ|õ|ọ|ô|ố|ồ|ổ|ỗ|ộ|ơ|ớ|ờ|ở|ỡ|ợ/g, "o");
    slug = slug.replace(/ú|ù|ủ|ũ|ụ|ư|ứ|ừ|ử|ữ|ự/g, "u");
    slug = slug.replace(/ý|ỳ|ỷ|ỹ|ỵ/g, "y");
    slug = slug.replace(/đ/g, "d");
    slug = slug.replace(/[^a-z0-9\s-]/g, "");
    slug = slug.replace(/\s+/g, "-");
    return slug.trim().replace(/^-+|-+$/g, "") || "day";
}

function convertTimeToId(timeText, dayId) {
    let numbers = timeText.replace(/[^0-9]/g, "");
    if (!numbers) numbers = "time";
    return `t${numbers}_${dayId}`;
}

function syncAllIDs() {
    const dayText = document.getElementById('dayText').value;
    const timeText = document.getElementById('timeText').value;
    const classSelect = document.getElementById('classDropdown');
    
    const dayId = convertToSlug(dayText);
    const timeId = convertTimeToId(timeText, dayId);
    const classId = classSelect.value; 

    document.getElementById('dayIdPreview').innerText = dayId;
    document.getElementById('timeIdPreview').innerText = timeId;
    document.getElementById('classIdPreview').innerText = classId;
}

function generateMarkup() {
    const dayText = document.getElementById('dayText').value.trim();
    const timeText = document.getElementById('timeText').value.trim();
    const classSelect = document.getElementById('classDropdown');
    const classId = classSelect.value; 
    
    const dayId = convertToSlug(dayText);
    const timeId = convertTimeToId(timeText, dayId);
    
    let classDisplayName = classSelect.options[classSelect.selectedIndex].getAttribute('data-name');
    if(classId === "SVIP") {
        classDisplayName = "LỚP SVIP";
    }
    
    let currentStNum = parseInt(document.getElementById('startIdNum').value.trim()) || 1;
    const lines = document.getElementById('rawList').value.split('\n');

    let studentsHTML = "";
    let displayIndex = 1;

    lines.forEach(line => {
        if(line.trim() !== "") {
            let info = line.split('-');
            let name = info[0] ? info[0].trim() : "Chưa nhập tên";
            let phone = info[1] ? info[1].trim() : "";
            
            let cleanPhone = phone.replace(/\s/g, '');
            let sid = `st_${classId}_${currentStNum}`;

            studentsHTML += `            <div class="student-card" id="${sid}">
                <div>${displayIndex}. ${name}\t${phone}</div>
                <div class="btn-group">
                    <button class="btn-yes" onclick="setAttendance('${sid}', true)">Có</button>
                    <button class="btn-no" onclick="setAttendance('${sid}', false)">Vắng</button>
                    <a href="tel:${cleanPhone}" class="btn-call">📞 Gọi điện</a>
                </div>
                <select class="move-select" onchange="moveStudentDirect('${sid}', this.value)">
                    <option value="">➡️ Chuyển lớp...</option>
                </select>
                <select onchange="updateStudentClassContext('${sid}')">
                    <option value="">-- Ghi chú --</option>
                    <option value="Nghỉ phép">Nghỉ phép</option>
                    <option value="Đi muộn">Đi muộn</option>
                </select>
            </div>\n`;
            
            currentStNum++;
            displayIndex++;
        }
    });

    if(studentsHTML === "") {
        studentsHTML = `            \n`;
    }

    // CẤU TRÚC ĐÃ ĐƯỢC SỬA ĐỔI: Bọc đầy đủ theo Thứ -> Phiên Học -> Lớp Học
    const finalHTML = `<div class="main-btn" onclick="toggle('${dayId}')">► ${dayText.toUpperCase()}</div>
<div id="${dayId}" class="section">
    <div class="time-btn" onclick="toggle('${timeId}')">${timeText}</div>
    <div id="${timeId}" class="section">
        
        <div class="class-btn" onclick="toggle('list-${classId}')">${classDisplayName} <span id="count-${classId}" style="color:#fbbf24;">(0/0)</span> ▼</div>
        <div id="list-${classId}" class="section" data-id="${classId}" data-name="${classDisplayName}">
            
${studentsHTML}
            <div class="bottom-controls">
                <div class="class-absent-list" id="absent-${classId}">Danh sách vắng:<br>Không có</div>
                <button class="btn-copy" onclick="copyAbsentList('${classId}')">📋 Copy DS Vắng</button>
            </div>
        </div>

    </div>
</div>`;

    document.getElementById('codeResult').innerText = finalHTML;
    document.getElementById('outputArea').style.display = 'block';
}

function copyToClipboard() {
    const text = document.getElementById('codeResult').innerText;
    navigator.clipboard.writeText(text).then(() => {
        alert("Đã copy thành công mã HTML!");
    }).catch(() => {
        alert("Thao tác lỗi, vui lòng copy thủ công!");
    });
}

syncAllIDs();
</script>

</body>
</html>
