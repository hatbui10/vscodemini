<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tạo Code Học Sinh</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: white; padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: auto; background: #34495e; padding: 20px; border-radius: 16px; }
        h2 { text-align: center; margin-top: 0; }
        textarea { width: 100%; height: 120px; padding: 10px; border-radius: 8px; border: none; box-sizing: border-box; }
        .row { display: flex; gap: 10px; margin: 10px 0; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; font-size: 16px; }
        button { width: 100%; padding: 18px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-gen { background: #27ae60; color: white; margin-top: 10px; }
        .btn-copy { background: #3498db; color: white; margin-top: 15px; }
        pre { background: #1a252f; padding: 15px; border-radius: 8px; overflow-x: auto; color: #a29bfe; font-size: 13px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Tạo Code HTML Học Sinh</h2>
    <p>Dán dữ liệu Excel (Tên [Tab] SĐT):</p>
    <textarea id="bulkInput" placeholder="Ví dụ:&#10;Nguyễn Văn A    0901234567&#10;Trần Thị B      0912345678"></textarea>
    
    <div class="row">
        <input type="text" id="prefixId" value="st" placeholder="ID (st)">
        <input type="text" id="className" value="A1" placeholder="Lớp (A1)">
    </div>

    <button class="btn-gen" onclick="taoCodeHtml()">⚙️ Tạo Code HTML</button>

    <h3>Kết quả (Copy vào file HTML):</h3>
    <pre id="htmlOutput"></pre>
    <button class="btn-copy" onclick="copyResult()">📋 Copy kết quả</button>
</div>

<script>
    function taoCodeHtml() {
        let rawText = document.getElementById('bulkInput').value.trim();
        if(!rawText) return alert("Vui lòng dán dữ liệu!");

        let className = document.getElementById('className').value;
        let prefix = document.getElementById('prefixId').value;
        let htmlResult = "";

        rawText.split('\n').forEach((line, index) => {
            let parts = line.split('\t');
            let ten = parts[0] ? parts[0].trim() : "HS" + (index + 1);
            let sdt = parts.length > 1 ? parts[parts.length-1].trim() : "0000000000";
            let stId = prefix + (index + 1);

            htmlResult += `<div class="student-card" id="${stId}">
    <div>${index + 1}. ${ten}</div>
    <div class="btn-group">
        <button class="btn-yes" onclick="setAttendance('${stId}', false, '${className}')">Có</button>
        <button class="btn-no" onclick="setAttendance('${stId}', true, '${className}')">Vắng</button>
        <a href="tel:${sdt}" class="btn-call">📞 Gọi</a>
    </div>
    <select onchange="moveStudentDirect('${stId}', this.value)">
        <option value="">➡️ Chuyển lớp...</option>
        <option value="A1">Lớp A1</option>
        <option value="A2">Lớp A2</option>
    </select>
    <select onchange="updateClassAbsentList('${className}')">
        <option value="">-- Ghi chú --</option>
        <option value="Nghỉ phép">Nghỉ phép</option>
        <option value="Đi muộn">Đi muộn</option>
    </select>
</div>\n`;
        });
        document.getElementById('htmlOutput').innerText = htmlResult;
    }

    function copyResult() {
        let text = document.getElementById('htmlOutput').innerText;
        if(!text) return;
        navigator.clipboard.writeText(text).then(() => alert("Đã copy mã!"));
    }
</script>
</body>
</html>
