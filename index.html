<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini VS Code Mobile</title>
    <style>
        :root {
            --bg-base: #1e1e1e;
            --sidebar-bg: #252526;
            --activity-bar: #333333;
            --tab-bg: #2d2d2d;
            --tab-active: #1e1e1e;
            --text-color: #d4d4d4;
            --accent-color: #007acc;
            --border-color: #3f3f46;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Thanh tiêu đề di động */
        header {
            background-color: var(--activity-bar);
            padding: 10px 14px;
            font-size: 0.85rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .btn-action {
            background-color: #333;
            color: white;
            border: 1px solid var(--border-color);
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .btn-run {
            background-color: #2ea44f;
            border: none;
            font-weight: 600;
        }

        /* Workspace dạng dọc cho màn hình nhỏ */
        .workspace {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* Menu chọn file (Drawer ẩn/hiện trên mobile) */
        .sidebar {
            position: absolute;
            left: -100%;
            top: 0;
            width: 80%;
            max-width: 300px;
            height: 100%;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            z-index: 100;
            display: flex;
            flex-direction: column;
            transition: left 0.3s ease;
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-header {
            padding: 12px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: bold;
            color: #969696;
            background: #2d2d2d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
        }

        .file-item {
            padding: 10px 14px;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .file-item.active {
            background-color: #37373d;
            color: #ffffff;
            border-left: 3px solid var(--accent-color);
        }

        /* Vùng soạn thảo và xem trước */
        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-base);
            overflow: hidden;
        }

        .tabs-bar {
            background-color: var(--sidebar-bg);
            display: flex;
            overflow-x: auto;
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
        }

        .tab {
            padding: 8px 14px;
            font-size: 0.8rem;
            background-color: var(--tab-bg);
            border-right: 1px solid var(--border-color);
            cursor: pointer;
            color: #969696;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .tab.active {
            background-color: var(--tab-active);
            color: #ffffff;
            border-top: 2px solid var(--accent-color);
        }

        .editor-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        textarea {
            flex: 1;
            background-color: var(--bg-base);
            color: var(--text-color);
            border: none;
            padding: 12px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95rem;
            resize: none;
            outline: none;
            line-height: 1.5;
        }

        /* Màn hình Preview ẩn/hiện dạng Overlay */
        .preview-pane {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            z-index: 200;
            display: none;
            flex-direction: column;
        }

        .preview-pane.active {
            display: flex;
        }

        .preview-header {
            background-color: #f0f0f0;
            padding: 10px 14px;
            font-size: 0.85rem;
            color: #333;
            border-bottom: 1px solid #ddd;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #preview-iframe {
            flex: 1;
            border: none;
            width: 100%;
            height: 100%;
        }

        .backdrop {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 90;
            display: none;
        }
        .backdrop.show {
            display: block;
        }
    </style>
</head>
<body>

    <header>
        <button class="btn-action" onclick="toggleSidebar()">📁 Danh Sách File</button>
        <span id="currentFileName" style="font-size: 0.8rem; color: #9cdcfe;">index.html</span>
        <div class="header-actions">
            <button class="btn-action btn-run" onclick="runProject()">▶ Chạy</button>
        </div>
    </header>

    <div class="workspace">
        <!-- Backdrop mờ khi mở menu file -->
        <div class="backdrop" id="backdrop" onclick="toggleSidebar()"></div>

        <!-- Sidebar danh sách file -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span>📁 Explorer (33 Files)</span>
                <span onclick="toggleSidebar()" style="font-size:1.1rem; padding:0 6px;">✕</span>
            </div>
            <ul class="file-list" id="fileListUI"></ul>
        </div>

        <!-- Trình soạn thảo -->
        <div class="editor-container">
            <div class="tabs-bar" id="tabsBarUI"></div>
            <div class="editor-pane">
                <textarea id="codeEditor" placeholder="Chọn file từ nút 'Danh Sách File' để dán code..."></textarea>
            </div>
        </div>

        <!-- Màn hình kết quả chạy trên di động -->
        <div class="preview-pane" id="previewPane">
            <div class="preview-header">
                <span>🌐 Kết Quả Chạy Thực Tế</span>
                <button class="btn-action" style="background:#333;" onclick="closePreview()">✕ Đóng</button>
            </div>
            <iframe id="preview-iframe"></iframe>
        </div>
    </div>

    <script>
        const projectFiles = {
            "index.html": { type: "html", content: '<div style="padding:15px; font-family:sans-serif;">\n    <h2>Ứng dụng Mobile</h2>\n    <p id="msg">Đang chờ module chạy...</p>\n</div>' },
        };

        for (let i = 1; i <= 10; i++) {
            projectFiles[`css/style${i}.css`] = { 
                type: "css", 
                content: `/* style${i}.css */\nbody {\n    background-color: #0f172a;\n    color: #fff;\n}` 
            };
        }

        for (let i = 1; i <= 20; i++) {
            projectFiles[`js/module${i}.js`] = { 
                type: "js", 
                content: `// module${i}.js\nconsole.log("Module ${i} OK");\nif(${i}===1) document.getElementById("msg").innerText="Đã nạp thành công 30 module!";` 
            };
        }

        let currentActiveFile = "index.html";
        let openTabs = ["index.html"];

        const codeEditor = document.getElementById('codeEditor');

        codeEditor.addEventListener('input', (e) => {
            if (projectFiles[currentActiveFile]) {
                projectFiles[currentActiveFile].content = e.target.value;
            }
        });

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('backdrop').classList.toggle('show');
        }

        function renderFileList() {
            const fileListUI = document.getElementById('fileListUI');
            fileListUI.innerHTML = '';
            for (let filename in projectFiles) {
                const li = document.createElement('li');
                li.className = `file-item ${filename === currentActiveFile ? 'active' : ''}`;
                let icon = filename.includes('.html') ? '🌐' : filename.includes('.css') ? '🎨' : '⚡';
                li.innerHTML = `${icon} <span>${filename}</span>`;
                li.onclick = () => { openFile(filename); toggleSidebar(); };
                fileListUI.appendChild(li);
            }
        }

        function renderTabs() {
            const tabsBarUI = document.getElementById('tabsBarUI');
            tabsBarUI.innerHTML = '';
            openTabs.forEach(filename => {
                const tab = document.createElement('div');
                tab.className = `tab ${filename === currentActiveFile ? 'active' : ''}`;
                tab.innerHTML = `<span>${filename}</span> <span onclick="event.stopPropagation(); closeTab('${filename}')" style="opacity:0.6">✕</span>`;
                tab.onclick = () => switchFile(filename);
                tabsBarUI.appendChild(tab);
            });
        }

        function openFile(filename) {
            if (!openTabs.includes(filename)) openTabs.push(filename);
            currentActiveFile = filename;
            codeEditor.value = projectFiles[filename].content;
            document.getElementById('currentFileName').innerText = filename;
            renderFileList();
            renderTabs();
        }

        function switchFile(filename) {
            currentActiveFile = filename;
            codeEditor.value = projectFiles[filename].content;
            document.getElementById('currentFileName').innerText = filename;
            renderFileList();
            renderTabs();
        }

        function closeTab(filename) {
            openTabs = openTabs.filter(f => f !== filename);
            if (openTabs.length === 0) openTabs.push("index.html");
            if (currentActiveFile === filename) switchFile(openTabs[openTabs.length - 1]);
            else renderTabs();
        }

        function runProject() {
            const iframe = document.getElementById('preview-iframe');
            const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;

            let finalHtml = projectFiles["index.html"].content;
            let combinedCSS = "";
            for (let i = 1; i <= 10; i++) combinedCSS += projectFiles[`css/style${i}.css`].content + "\n";
            let combinedJS = "";
            for (let i = 1; i <= 20; i++) combinedJS += projectFiles[`js/module${i}.js`].content + "\n";

            const fullOutput = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${combinedCSS}</style></head><body>${finalHtml}<script>${combinedJS}<\/script></body></html>`;

            iframeDoc.open();
            iframeDoc.write(fullOutput);
            iframeDoc.close();

            document.getElementById('previewPane').classList.add('active');
        }

        function closePreview() {
            document.getElementById('previewPane').classList.remove('active');
        }

        renderFileList();
        openFile("index.html");
    </script>
</body>
</html>
