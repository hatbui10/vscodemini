<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tool Tạo Dữ liệu Lớp</title>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #2c3e50; color: white; margin: 0; }
        .container { max-width: 600px; margin: auto; background: #34495e; padding: 20px; border-radius: 12px; }
        .row { display: flex; gap: 10px; }
        .row input, .row select { flex: 1; width: 50%; }
        input, select, textarea { display: block; width: 100%; margin: 8px 0; padding: 12px; border: none; border-radius: 8px; box-sizing: border-box; font-size: 16px; background: white; color: black; }
        select { height: 46px; cursor: pointer; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin: 8px 0; }
        .btn-bulk { background: #e67e22; color: white; }
        .btn-copy { background: #3498db; color: white; }
        pre { background: #1a252f; padding: 15px; border-radius: 8px; border-left: 5px solid #3498db; overflow-x: auto; font-size: 14px; white-space: pre; color: #eaf2f8; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center">Tạo Dữ liệu Lớp (Tên & SĐT)</h2>
    
    <div class="row">
        <select id="tenLop">
            <option value="SVIP">SVIP - L4-7/Lê Thu Hà</option>
            <option value="SKY - KID">SKY - KID</option>
            <option value="SMART-KID">SMART-KID</option>
            <option value="CLOUD-KID MG+1">CLOUD-KID MG+1</option>
            <option value="OZON-L2+3/Ngô Hằng">OZON-L2+3/Ngô Hằng</option>
            <option value="MICKEY - L2+3/Thị Phương">MICKEY - L2+3/Thị Phương</option>
            <option value="OXFORD  L4/Thu Phương">OXFORD  L4/Thu Phương</option>
            <option value="QUEST - L4 Thu Phương">QUEST - L4 Thu Phương</option>
            <option value="CAMBRIDGE - L4/Nhung">CAMBRIDGE - L4/Nhung</option>
            <option value="KING - L4/Thu Phương">KING - L4/Thu Phương</option>
            <option value="GALAXY - L4/Minh Phương">GALAXY - L4/Minh Phương</option>
            <option value="KIND L5 /Tân">KIND L5 - Tân</option>
            <option value="APOLLO L5/Yến ">APOLLO L5 - Yến </option>
            <option value="LIKE L5/Thu Phương">LIKE L5-Thu Phương</option>
            <option value="SMILE-L6-Hà An">SMILE-L6-Hà An</option>
            <option value="STAR-L6-Thanh Thảo">STAR-L6-Thanh Thảo</option>
            <option value="GOOD-L6-Hà An ">GOOD-L6-Hà An </option>
            <option value="MARS - L6-Ngô Hằng">MARS - L6-Ngô Hằng</option>
            <option value="PARIS-L6/Minh Phương">PARIS-L6/Minh Phương</option>
            <option value="EVIC">EVIC</option>
            <option value="KID - L7- Thanh Thảo">KID - L7- Thanh Thảo</option>
            <option value="BOSS-VIP - L7/Lê Thu Hà">BOSS-VIP - L7/Lê Thu Hà</option>
            <option value="MOON-L7/Trà My">MOON-L7/Trà My</option>
            <option value="ILA-L7/Thu Hà">ILA-L7/Thu Hà</option>
            <option value="DELTA-L7/Phương">DELTA-L7/Phương</option>
            <option value="Happy - L8/Mai Ly">Happy - L8/Mai Ly</option>
            <option value="Sun - L8/Mai Ly">Sun - L8/Mai Ly</option>
            <option value="High - L8/Thu Hà">High - L8/Thu Hà</option>
            <option value="HOPE-L8/TRÀ MY">HOPE-L8/TRÀ MY</option>
            <option value="BIG-L9/Mai Ly">BIG-L9/Mai Ly</option>
            <option value="SUPER - L9/Thu Hà">SUPER - L9/Thu Hà</option>
            <option value="SEA - L9/Thu Hà">SEA - L9/Thu Hà</option>
            <option value="CLC-L9/Thu Hà">CLC-L9/Thu Hà</option>
            <option value="WIN - L10/Thu Hà">WIN - L10/Thu Hà</option>
            <option value="SMART - L10/Hà An">SMART - L10/Hà An</option>
            <option value="CLOUD - L10/Hà An">CLOUD - L10/Hà An</option>
            <option value="TRY - L10/Thu Hà">TRY - L10/Thu Hà</option>
            <option value="CAN - L11/Lê Thu Hà">CAN - L11/Lê Thu Hà</option>
            <option value="OCEAN-L11">OCEAN-L11</option>
            <option value="OCE">OCE</option>
            <option value="VICTORYA">VICTORYA</option>
            <option value="ATHENA-L12/Mai Ly">ATHENA-L12/Mai Ly</option>
            <option value="IELTS-WONDERFUL/Thu Hà">IELTS-WONDERFUL/Thu Hà</option>
            <option value="SPACEX">SPACEX</option>
            <option value="FUN - IE-L12/Lê Thu Hà">FUN - IE-L12/Lê Thu Hà</option>
            <option value=" IELTS 3/26"> IELTS 3/26</option>
            <option value="L12-BLUE">L12-BLUE</option>
            <option value="E1A - L12/ Lê Thu Hà">E1A - L12/ Lê Thu Hà</option>
        </select>
        
        <select id="thuHoc">
            <option value="Thứ 2">Thứ 2</option>
            <option value="Thứ 3">Thứ 3</option>
            <option value="Thứ 4">Thứ 4</option>
            <option value="Thứ 5">Thứ 5</option>
            <option value="Thứ 6">Thứ 6</option>
            <option value="Thứ 7">Thứ 7</option>
            <option value="Chủ Nhật">Chủ Nhật</option>
        </select>
    </div>
    
    <div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; margin-top: 10px;">
        <h4 style="margin-top:0">Thêm hàng loạt từ Excel (Cột Tên & Cột SĐT):</h4>
        <textarea id="bulkInput" rows="5" placeholder="Dán dữ liệu từ Excel vào đây..."></textarea>
        <button class="btn-bulk" onclick="themHangLoat()">📥 Thêm từ Excel</button>
    </div>

    <h3>Kết quả định dạng sạch:</h3>
    <pre id="jsonOutput">// Dữ liệu sẽ xuất hiện tại đây...</pre>
    <button class="btn-copy" onclick="copyJson()">📋 Copy định dạng sạch</button>
</div>

<script>
    function themHangLoat() {
        let rawText = document.getElementById('bulkInput').value.trim();
        let tenLopChinh = document.getElementById('tenLop').value;
        let thuHoc = document.getElementById('thuHoc').value;
        
        if(!rawText) return alert("Vui lòng dán dữ liệu từ Excel!");

        let danhSachHs = [];
        let lines = rawText.split('\n');
        
        lines.forEach(line => {
            let parts = line.split('\t');
            let ten = parts[0] ? parts[0].trim() : "";
            let sdt = parts[parts.length - 1] ? parts[parts.length - 1].trim() : "";

            if (!/^\d[\d\s-]*\d$/.test(sdt) && parts.length > 1) {
                sdt = parts[parts.length - 2] ? parts[parts.length - 2].trim() : "";
            }

            if(ten && sdt.length >= 8) {
                danhSachHs.push({ 
                    ten: ten, 
                    sdt: sdt
                });
            }
        });

        // Tạo chuỗi Object thu gọn hoàn toàn (Chỉ còn ten và sdt)
        let output = "{\n";
        output += `    tenLop: "${tenLopChinh}",\n`;
        output += `    thu: "${thuHoc}",\n`;
        output += `    hocSinh: [\n`;
        
        let hsLines = danhSachHs.map(hs => {
            return `        { ten: "${hs.ten}", sdt: "${hs.sdt}" }`;
        });
        
        output += hsLines.join(",\n");
        output += `\n    ]\n},`;
        
        document.getElementById('jsonOutput').innerText = output;
    }

    function copyJson() {
        let text = document.getElementById('jsonOutput').innerText;
        if(text.startsWith("//")) return alert("Chưa có dữ liệu để sao chép!");
        
        navigator.clipboard.writeText(text).then(() => {
            alert("Đã copy thành công!");
        }).catch(err => {
            alert("Lỗi khi copy: " + err);
        });
    }
</script>
</body>
</html>
