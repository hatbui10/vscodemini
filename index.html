<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini VS Code Mobile - Pro Edition</title>
    <style>
        :root {
            --bg-base: #1e1e1e;
            --sidebar-bg: #252526;
            --activity-bar: #333333;
            --tab-bg: #2d2d2d;
            --tab-active: #1e1e1e;
            --text-color: #d4d4d4;
            --accent-color: #007acc;
            --border-color: #3f3f46;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background-color: var(--activity-bar);
            padding: 8px 12px;
            font-size: 0.8rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-actions {
            display: flex;
            gap: 5px;
        }

        .btn-action {
            background-color: #333;
            color: white;
            border: 1px solid var(--border-color);
            padding: 5px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            cursor: pointer;
        }

        .btn-run {
            background-color: #2ea44f;
            border: none;
            font-weight: 600;
        }

        .workspace {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .sidebar {
            position: absolute;
            left: -100%;
            top: 0;
            width: 80%;
            max-width: 300px;
            height: 100%;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            z-index: 100;
            display: flex;
            flex-direction: column;
            transition: left 0.3s ease;
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-header {
            padding: 12px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: bold;
            color: #969696;
            background: #2d2d2d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
        }

        .file-item {
            padding: 10px 14px;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .file-item.active {
            background-color: #37373d;
            color: #ffffff;
            border-left: 3px solid var(--accent-color);
        }

        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-base);
            overflow: hidden;
        }

        .tabs-bar {
            background-color: var(--sidebar-bg);
            display: flex;
            overflow-x: auto;
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
        }

        .tab {
            padding: 8px 14px;
            font-size: 0.8rem;
            background-color: var(--tab-bg);
            border-right: 1px solid var(--border-color);
            cursor: pointer;
            color: #969696;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .tab.active {
            background-color: var(--tab-active);
            color: #ffffff;
            border-top: 2px solid var(--accent-color);
        }

        .editor-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: auto; /* Tạo thanh cuộn tổng cho toàn vùng soạn thảo */
        }

        /* Tăng kích thước ô nhập code và cho phép cuộn ngang/dọc */
        textarea {
            width: 100%;
            min-height: 100%;
            flex: 1;
            background-color: var(--bg-base);
            color: var(--text-color);
            border: none;
            padding: 16px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem; /* Tăng kích thước chữ cho dễ nhìn */
            resize: none;
            outline: none;
            line-height: 1.6;
            white-space: pre;
            overflow-x: auto; /* Bật thanh cuộn ngang khi code dài */
        }

        /* Thanh cuộn tùy chỉnh cho textarea và màn hình phân tích */
        textarea::-webkit-scrollbar, #analyzer-view::-webkit-scrollbar, .file-list::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        textarea::-webkit-scrollbar-thumb, #analyzer-view::-webkit-scrollbar-thumb, .file-list::-webkit-scrollbar-thumb {
            background: #424242;
            border-radius: 4px;
        }
        textarea::-webkit-scrollbar-track, #analyzer-view::-webkit-scrollbar-track {
            background: #1e1e1e;
        }

        /* Màn hình phân tích module với thanh cuộn hoàn chỉnh */
        #analyzer-view {
            display: none;
            flex: 1;
            width: 100%;
            min-height: 100%;
            background: #1e1e1e;
            color: #38bdf8;
            padding: 20px;
            font-family: monospace;
            font-size: 0.9rem;
            overflow-y: auto; /* Bật thanh cuộn dọc */
            overflow-x: auto; /* Bật thanh cuộn ngang nếu nội dung tràn */
            line-height: 1.6;
            white-space: nowrap; /* Giữ cấu trúc dòng không bị bẻ cụt xấu */
        }

        .preview-pane {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            z-index: 200;
            display: none;
            flex-direction: column;
        }

        .preview-pane.active {
            display: flex;
        }

        .preview-header {
            background-color: #f0f0f0;
            padding: 10px 14px;
            font-size: 0.85rem;
            color: #333;
            border-bottom: 1px solid #ddd;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #preview-iframe {
            flex: 1;
            border: none;
            width: 100%;
            height: 100%;
        }

        .console-panel {
            background-color: #121212;
            border-top: 1px solid var(--border-color);
            height: 100px;
            display: flex;
            flex-direction: column;
        }

        .console-header {
            background-color: #252526;
            padding: 4px 10px;
            font-size: 0.7rem;
            color: #9cdcfe;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        #error-console {
            flex: 1;
            background: #000;
            color: #38bdf8;
            padding: 6px 10px;
            font-family: monospace;
            font-size: 0.7rem;
            overflow-y: auto;
            line-height: 1.4;
        }

        .backdrop {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 90;
            display: none;
        }
        .backdrop.show {
            display: block;
        }
    </style>
</head>
<body>

    <header>
        <button class="btn-action" onclick="toggleSidebar()">📁 File</button>
        <span id="currentFileName" style="font-size: 0.75rem; color: #9cdcfe;">index.html</span>
        <div class="header-actions">
            <button class="btn-action" onclick="downloadProject()" title="Tải code về máy">📥 Tải</button>
            <button class="btn-action btn-run" onclick="runProject()">▶ Chạy</button>
        </div>
    </header>

    <div class="workspace">
        <div class="backdrop" id="backdrop" onclick="toggleSidebar()"></div>

        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span>📁 Quản Lý Dự Án</span>
                <span onclick="toggleSidebar()" style="font-size:1.1rem; cursor:pointer;">✕</span>
            </div>
            <ul class="file-list" id="fileListUI"></ul>
        </div>

        <div class="editor-container">
            <div class="tabs-bar" id="tabsBarUI"></div>
            <div class="editor-pane">
                <textarea id="codeEditor" placeholder="Chọn file để chỉnh sửa..."></textarea>
                <div id="analyzer-view"></div>
            </div>
        </div>

        <div class="preview-pane" id="previewPane">
            <div class="preview-header">
                <span>🌐 Màn Hình Kết Quả</span>
                <button class="btn-action" style="background:#333;" onclick="closePreview()">✕ Đóng</button>
            </div>
            <iframe id="preview-iframe"></iframe>
        </div>
    </div>

    <div class="console-panel">
        <div class="console-header">
            <span>💻 Trạng Thái & Bắt Lỗi</span>
            <span style="cursor:pointer; color:#888;" onclick="document.getElementById('error-console').innerHTML='> Đã xóa log.'">🗑️ Xóa</span>
        </div>
        <div id="error-console">> Đã cập nhật không gian mở rộng và thanh cuộn.</div>
    </div>

    <script>
        let projectFiles = JSON.parse(localStorage.getItem('my_project_files')) || {
            "index.html": { 
                type: "html", 
                content: '<div style="padding:15px; font-family:sans-serif;">\n    <h2>Dự Án Đang Chạy</h2>\n    <p id="status-text">Đang chờ module JS...</p>\n</div>' 
            }
        };

        for (let i = 1; i <= 10; i++) {
            if (!projectFiles[`css/style${i}.css`]) {
                projectFiles[`css/style${i}.css`] = { type: "css", content: `/* style${i}.css */\nbody { background: #0f172a; color: #fff; }` };
            }
        }

        for (let i = 1; i <= 20; i++) {
            if (!projectFiles[`js/module${i}.js`]) {
                projectFiles[`js/module${i}.js`] = { type: "js", content: `// module${i}.js\nconsole.log("Module ${i} sẵn sàng.");\nif(${i}===1) document.getElementById("status-text").innerText="Tất cả module đã hoạt động!";` };
            }
        }

        let currentActiveFile = "index.html";
        let openTabs = ["index.html"];
        const codeEditor = document.getElementById('codeEditor');
        const analyzerView = document.getElementById('analyzer-view');

        codeEditor.addEventListener('input', (e) => {
            if (projectFiles[currentActiveFile]) {
                projectFiles[currentActiveFile].content = e.target.value;
                localStorage.setItem('my_project_files', JSON.stringify(projectFiles));
            }
        });

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('backdrop').classList.toggle('show');
        }

        function renderFileList() {
            const fileListUI = document.getElementById('fileListUI');
            fileListUI.innerHTML = '';
            
            const analyzeLi = document.createElement('li');
            analyzeLi.className = `file-item ${currentActiveFile === 'ANALYZE_TOOL' ? 'active' : ''}`;
            analyzeLi.innerHTML = `📊 <span style="color:#38bdf8; font-weight:bold;">Phân Tích Mối Quan Hệ JS</span>`;
            analyzeLi.onclick = () => { openAnalyzer(); toggleSidebar(); };
            fileListUI.appendChild(analyzeLi);

            for (let filename in projectFiles) {
                const li = document.createElement('li');
                li.className = `file-item ${filename === currentActiveFile ? 'active' : ''}`;
                let icon = filename.includes('.html') ? '🌐' : filename.includes('.css') ? '🎨' : '⚡';
                li.innerHTML = `${icon} <span>${filename}</span>`;
                li.onclick = () => { openFile(filename); toggleSidebar(); };
                fileListUI.appendChild(li);
            }
        }

        function renderTabs() {
            const tabsBarUI = document.getElementById('tabsBarUI');
            tabsBarUI.innerHTML = '';
            openTabs.forEach(filename => {
                const tab = document.createElement('div');
                tab.className = `tab ${filename === currentActiveFile ? 'active' : ''}`;
                let displayName = filename === 'ANALYZE_TOOL' ? '📊 Phân Tích' : filename;
                tab.innerHTML = `<span>${displayName}</span> <span onclick="event.stopPropagation(); closeTab('${filename}')" style="opacity:0.6">✕</span>`;
                tab.onclick = () => filename === 'ANALYZE_TOOL' ? openAnalyzer() : switchFile(filename);
                tabsBarUI.appendChild(tab);
            });
        }

        function openFile(filename) {
            if (!openTabs.includes(filename)) openTabs.push(filename);
            currentActiveFile = filename;
            codeEditor.style.display = 'block';
            analyzerView.style.display = 'none';
            codeEditor.value = projectFiles[filename].content;
            document.getElementById('currentFileName').innerText = filename;
            renderFileList();
            renderTabs();
        }

        function switchFile(filename) {
            currentActiveFile = filename;
            codeEditor.style.display = 'block';
            analyzerView.style.display = 'none';
            codeEditor.value = projectFiles[filename].content;
            document.getElementById('currentFileName').innerText = filename;
            renderFileList();
            renderTabs();
        }

        function openAnalyzer() {
            currentActiveFile = 'ANALYZE_TOOL';
            if (!openTabs.includes('ANALYZE_TOOL')) openTabs.push('ANALYZE_TOOL');
            codeEditor.style.display = 'none';
            analyzerView.style.display = 'block';
            document.getElementById('currentFileName').innerText = 'Phân Tích Module';

            let report = "<h3>🔍 BÁO CÁO QUÉT MỐI QUAN HỆ 20 MODULE JS</h3><hr style='border-color:#444; margin:10px 0'>";
            let totalFunctions = 0;

            for (let i = 1; i <= 20; i++) {
                let code = projectFiles[`js/module${i}.js`].content;
                let matches = code.match(/function\s+([a-zA-Z0-9_$]+)/g) || [];
                totalFunctions += matches.length;
                report += `<b>module${i}.js</b>: Tìm thấy ${matches.length} hàm (${matches.join(', ') || 'Không có hàm riêng'})<br>`;
            }
            report += `<hr style='border-color:#444; margin:10px 0'><b>Tổng kết:</b> Đã quét qua 20 module, phát hiện tổng cộng ${totalFunctions} hàm tương tác.`;
            analyzerView.innerHTML = report;

            renderFileList();
            renderTabs();
        }

        function closeTab(filename) {
            openTabs = openTabs.filter(f => f !== filename);
            if (openTabs.length === 0) openTabs.push("index.html");
            if (currentActiveFile === filename) {
                let next = openTabs[openTabs.length - 1];
                next === 'ANALYZE_TOOL' ? openAnalyzer() : switchFile(next);
            } else {
                renderTabs();
            }
        }

        function runProject() {
            const iframe = document.getElementById('preview-iframe');
            const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;

            let finalHtml = projectFiles["index.html"].content;
            let combinedCSS = "";
            for (let i = 1; i <= 10; i++) combinedCSS += projectFiles[`css/style${i}.css`].content + "\n";
            let combinedJS = "";
            for (let i = 1; i <= 20; i++) combinedJS += projectFiles[`js/module${i}.js`].content + "\n";

            const fullOutput = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${combinedCSS}</style></head><body>${finalHtml}<script>window.onerror=function(m,u,l){window.parent.postMessage({type:'ERROR',message:m,line:l},'*');};try{${combinedJS}}catch(e){window.parent.postMessage({type:'ERROR',message:e.message},'*');}<\/script></body></html>`;

            iframeDoc.open();
            iframeDoc.write(fullOutput);
            iframeDoc.close();
            document.getElementById('previewPane').classList.add('active');
        }

        function closePreview() {
            document.getElementById('previewPane').classList.remove('active');
        }

        function downloadProject() {
            let finalHtml = projectFiles["index.html"].content;
            let combinedCSS = "";
            for (let i = 1; i <= 10; i++) combinedCSS += `/* style${i}.css */\n` + projectFiles[`css/style${i}.css`].content + "\n";
            let combinedJS = "";
            for (let i = 1; i <= 20; i++) combinedJS += `/* module${i}.js */\n` + projectFiles[`js/module${i}.js`].content + "\n";

            let bundleContent = `<!DOCTYPE html>\n<html lang="vi">\n<head>\n<meta charset="UTF-8">\n<style>\n${combinedCSS}\n</style>\n</head>\n<body>\n${finalHtml}\n<script>\n${combinedJS}\n<\/script>\n</body>\n</html>`;

            let blob = new Blob([bundleContent], { type: 'text/html' });
            let a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'index.html';
            a.click();
            logToConsole("Đã tạo file tổng hợp index.html sẵn sàng đẩy lên GitHub Pages!", "success");
        }

        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'ERROR') {
                logToConsole(`[LỖI]: ${event.data.message} (Dòng: ${event.data.line || 'N/A'})`, "error");
            }
        });

        function logToConsole(text, type = "normal") {
            const consoleBox = document.getElementById('error-console');
            let color = type === "error" ? "#ff5555" : type === "success" ? "#22c55e" : "#38bdf8";
            consoleBox.innerHTML += `<br><span style="color: ${color};">> ${text}</span>`;
            consoleBox.scrollTop = consoleBox.scrollHeight;
        }

        renderFileList();
        openFile("index.html");
    </script>
</body>
    </html>
