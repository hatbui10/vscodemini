<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Tạo Dữ liệu Lớp</title>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #2c3e50; color: white; margin: 0; }
        .container { max-width: 600px; margin: auto; background: #34495e; padding: 20px; border-radius: 12px; }
        input, textarea { display: block; width: 100%; margin: 8px 0; padding: 12px; border: none; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .row { display: flex; gap: 10px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin: 8px 0; }
        .btn-bulk { background: #e67e22; color: white; }
        .btn-copy { background: #3498db; color: white; }
        pre { background: #1a252f; padding: 15px; border-radius: 8px; border-left: 5px solid #3498db; overflow-x: auto; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center">Tạo Dữ liệu Lớp</h2>
    <input type="text" id="tenLop" placeholder="Tên lớp (VD: 12A1)">
    
    <div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px;">
        <h4 style="margin-top:0">Thêm từ Excel:</h4>
        <textarea id="bulkInput" rows="3" placeholder="Dán dữ liệu Copy từ Excel vào đây..."></textarea>
        
        <div class="row">
            <input type="number" id="colTen" placeholder="Cột tên (số)">
            <input type="number" id="colSdt" placeholder="Cột SĐT (số)">
        </div>
        <button class="btn-bulk" onclick="themHangLoat()">📥 Thêm từ Excel</button>
    </div>

    <h3>Kết quả:</h3>
    <pre id="jsonOutput">// Dữ liệu sẽ xuất hiện tại đây...</pre>
    <button class="btn-copy" onclick="copyJson()">📋 Copy định dạng sạch</button>
</div>

<script>
    let danhSachHs = [];

    function themHangLoat() {
        let rawText = document.getElementById('bulkInput').value.trim();
        let tenLop = document.getElementById('tenLop').value.trim();
        let colTen = parseInt(document.getElementById('colTen').value) - 1;
        let colSdt = parseInt(document.getElementById('colSdt').value) - 1;

        if(!tenLop || isNaN(colTen) || isNaN(colSdt)) {
            return alert("Vui lòng nhập Tên lớp và số thứ tự cột (ví dụ: 1 và 5)");
        }

        let lines = rawText.split('\n');
        lines.forEach(line => {
            let parts = line.split('\t');
            if(parts.length > Math.max(colTen, colSdt)) {
                danhSachHs.push({ 
                    ten: parts[colTen].trim(), 
                    lop: tenLop, 
                    sdt: parts[colSdt].trim(), 
                    hocPhi: "0" 
                });
            }
        });

        // Cập nhật hiển thị
        let output = `{\n    tenLop: "${tenLop}",\n    hocSinh: [\n`;
        output += danhSachHs.map(hs => 
            `        { ten: "${hs.ten}", lop: "${hs.lop}", sdt: "${hs.sdt}", hocPhi: "${hs.hocPhi}" }`
        ).join(',\n');
        output += `\n    ]\n},`;
        document.getElementById('jsonOutput').innerText = output;
    }

    function copyJson() {
        let text = document.getElementById('jsonOutput').innerText;
        navigator.clipboard.writeText(text).then(() => alert("Đã copy!"));
    }
</script>
</body>
</html>
