<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini VS Code Mobile - 30 Modules & Error Debugger</title>
    <style>
        :root {
            --bg-base: #1e1e1e;
            --sidebar-bg: #252526;
            --activity-bar: #333333;
            --tab-bg: #2d2d2d;
            --tab-active: #1e1e1e;
            --text-color: #d4d4d4;
            --accent-color: #007acc;
            --border-color: #3f3f46;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Thanh tiêu đề di động */
        header {
            background-color: var(--activity-bar);
            padding: 10px 14px;
            font-size: 0.85rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-actions {
            display: flex;
            gap: 6px;
        }

        .btn-action {
            background-color: #333;
            color: white;
            border: 1px solid var(--border-color);
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .btn-run {
            background-color: #2ea44f;
            border: none;
            font-weight: 600;
        }

        /* Workspace dạng dọc */
        .workspace {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* Menu chọn file (Drawer) */
        .sidebar {
            position: absolute;
            left: -100%;
            top: 0;
            width: 80%;
            max-width: 300px;
            height: 100%;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            z-index: 100;
            display: flex;
            flex-direction: column;
            transition: left 0.3s ease;
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-header {
            padding: 12px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: bold;
            color: #969696;
            background: #2d2d2d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
        }

        .file-item {
            padding: 10px 14px;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .file-item.active {
            background-color: #37373d;
            color: #ffffff;
            border-left: 3px solid var(--accent-color);
        }

        /* Vùng soạn thảo */
        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-base);
            overflow: hidden;
        }

        .tabs-bar {
            background-color: var(--sidebar-bg);
            display: flex;
            overflow-x: auto;
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
        }

        .tab {
            padding: 8px 14px;
            font-size: 0.8rem;
            background-color: var(--tab-bg);
            border-right: 1px solid var(--border-color);
            cursor: pointer;
            color: #969696;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .tab.active {
            background-color: var(--tab-active);
            color: #ffffff;
            border-top: 2px solid var(--accent-color);
        }

        .editor-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        textarea {
            flex: 1;
            background-color: var(--bg-base);
            color: var(--text-color);
            border: none;
            padding: 12px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            resize: none;
            outline: none;
            line-height: 1.5;
        }

        /* Màn hình Preview */
        .preview-pane {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            z-index: 200;
            display: none;
            flex-direction: column;
        }

        .preview-pane.active {
            display: flex;
        }

        .preview-header {
            background-color: #f0f0f0;
            padding: 10px 14px;
            font-size: 0.85rem;
            color: #333;
            border-bottom: 1px solid #ddd;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #preview-iframe {
            flex: 1;
            border: none;
            width: 100%;
            height: 100%;
        }

        /* Bảng Console Bắt Lỗi Nằm Dưới Cùng */
        .console-panel {
            background-color: #121212;
            border-top: 1px solid var(--border-color);
            height: 110px;
            display: flex;
            flex-direction: column;
        }

        .console-header {
            background-color: #252526;
            padding: 4px 10px;
            font-size: 0.75rem;
            color: #9cdcfe;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        #error-console {
            flex: 1;
            background: #000;
            color: #38bdf8;
            padding: 8px 12px;
            font-family: monospace;
            font-size: 0.75rem;
            overflow-y: auto;
            line-height: 1.4;
        }

        .backdrop {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 90;
            display: none;
        }
        .backdrop.show {
            display: block;
        }
    </style>
</head>
<body>

    <!-- Header điều khiển -->
    <header>
        <button class="btn-action" onclick="toggleSidebar()">📁 Danh Sách File</button>
        <span id="currentFileName" style="font-size: 0.8rem; color: #9cdcfe;">index.html</span>
        <div class="header-actions">
            <button class="btn-action btn-run" onclick="runProject()">▶ Chạy Dự Án</button>
        </div>
    </header>

    <div class="workspace">
        <div class="backdrop" id="backdrop" onclick="toggleSidebar()"></div>

        <!-- Sidebar Danh Sách 33 Files -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span>📁 Explorer (33 Files)</span>
                <span onclick="toggleSidebar()" style="font-size:1.1rem; cursor:pointer;">✕</span>
            </div>
            <ul class="file-list" id="fileListUI"></ul>
        </div>

        <!-- Trình soạn thảo Code -->
        <div class="editor-container">
            <div class="tabs-bar" id="tabsBarUI"></div>
            <div class="editor-pane">
                <textarea id="codeEditor" placeholder="Chọn file từ nút 'Danh Sách File' để dán code..."></textarea>
            </div>
        </div>

        <!-- Màn hình kết quả xem trước (Preview) -->
        <div class="preview-pane" id="previewPane">
            <div class="preview-header">
                <span>🌐 Màn Hình Chạy Thực Tế</span>
                <button class="btn-action" style="background:#333;" onclick="closePreview()">✕ Đóng</button>
            </div>
            <iframe id="preview-iframe"></iframe>
        </div>
    </div>

    <!-- Bảng Console Bắt Lỗi Trực Tiếp -->
    <div class="console-panel">
        <div class="console-header">
            <span>💻 Bảng Bắt Lỗi & Trạng Thái (Debugger)</span>
            <span style="cursor:pointer; color:#888;" onclick="document.getElementById('error-console').innerHTML='> Đã xóa log.'">🗑️ Xóa log</span>
        </div>
        <div id="error-console">> Môi trường thử nghiệm 33 file đã sẵn sàng.</div>
    </div>

    <script>
        // Khởi tạo toàn bộ cấu trúc 33 file trong bộ nhớ ảo
        const projectFiles = {
            "index.html": { 
                type: "html", 
                content: '<div class="card-test">\n    <h3>Hệ Thống Đang Hoạt Động</h3>\n    <p id="status-text">Đang chờ module JavaScript chạy...</p>\n</div>' 
            },
        };

        // Tạo tự động 10 file CSS
        for (let i = 1; i <= 10; i++) {
            projectFiles[`css/style${i}.css`] = { 
                type: "css", 
                content: `/* style${i}.css */\nbody {\n    background-color: #0f172a;\n    color: #f8fafc;\n    font-family: sans-serif;\n    padding: 15px;\n}\n.card-test {\n    background: #1e293b;\n    padding: 20px;\n    border-radius: 8px;\n    border: 1px solid #334155;\n}` 
            };
        }

        // Tạo tự động 20 file JS
        for (let i = 1; i <= 20; i++) {
            projectFiles[`js/module${i}.js`] = { 
                type: "js", 
                content: `// module${i}.js\nconsole.log("Module ${i} tải thành công.");\nif (${i} === 1) {\n    document.getElementById("status-text").innerText = "Tất cả 10 CSS và 20 JS đã nạp hoàn tất!";\n}` 
            };
        }

        let currentActiveFile = "index.html";
        let openTabs = ["index.html"];
        const codeEditor = document.getElementById('codeEditor');

        // Lưu thay đổi khi gõ code
        codeEditor.addEventListener('input', (e) => {
            if (projectFiles[currentActiveFile]) {
                projectFiles[currentActiveFile].content = e.target.value;
            }
        });

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('backdrop').classList.toggle('show');
        }

        function renderFileList() {
            const fileListUI = document.getElementById('fileListUI');
            fileListUI.innerHTML = '';
            for (let filename in projectFiles) {
                const li = document.createElement('li');
                li.className = `file-item ${filename === currentActiveFile ? 'active' : ''}`;
                let icon = filename.includes('.html') ? '🌐' : filename.includes('.css') ? '🎨' : '⚡';
                li.innerHTML = `${icon} <span>${filename}</span>`;
                li.onclick = () => { openFile(filename); toggleSidebar(); };
                fileListUI.appendChild(li);
            }
        }

        function renderTabs() {
            const tabsBarUI = document.getElementById('tabsBarUI');
            tabsBarUI.innerHTML = '';
            openTabs.forEach(filename => {
                const tab = document.createElement('div');
                tab.className = `tab ${filename === currentActiveFile ? 'active' : ''}`;
                tab.innerHTML = `<span>${filename}</span> <span onclick="event.stopPropagation(); closeTab('${filename}')" style="opacity:0.6">✕</span>`;
                tab.onclick = () => switchFile(filename);
                tabsBarUI.appendChild(tab);
            });
        }

        function openFile(filename) {
            if (!openTabs.includes(filename)) openTabs.push(filename);
            currentActiveFile = filename;
            codeEditor.value = projectFiles[filename].content;
            document.getElementById('currentFileName').innerText = filename;
            renderFileList();
            renderTabs();
        }

        function switchFile(filename) {
            currentActiveFile = filename;
            codeEditor.value = projectFiles[filename].content;
            document.getElementById('currentFileName').innerText = filename;
            renderFileList();
            renderTabs();
        }

        function closeTab(filename) {
            openTabs = openTabs.filter(f => f !== filename);
            if (openTabs.length === 0) openTabs.push("index.html");
            if (currentActiveFile === filename) switchFile(openTabs[openTabs.length - 1]);
            else renderTabs();
        }

        // Gom toàn bộ 10 file CSS và 20 file JS lại và chạy trong iframe kèm trình bắt lỗi
        function runProject() {
            const iframe = document.getElementById('preview-iframe');
            const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;

            let finalHtml = projectFiles["index.html"].content;
            
            let combinedCSS = "";
            for (let i = 1; i <= 10; i++) {
                combinedCSS += `\n/* css/style${i}.css */\n` + projectFiles[`css/style${i}.css`].content;
            }

            let combinedJS = "";
            for (let i = 1; i <= 20; i++) {
                combinedJS += `\n/* js/module${i}.js */\n` + projectFiles[`js/module${i}.js`].content;
            }

            const fullOutput = `
                <!DOCTYPE html>
                <html>
                <head>
                    <meta charset="UTF-8">
                    <style>${combinedCSS}</style>
                </head>
                <body>
                    ${finalHtml}
                    <script>
                        // Bắt lỗi bên trong màn hình chạy và đẩy ra console chính
                        window.onerror = function(msg, url, line) {
                            window.parent.postMessage({type: 'ERROR', message: msg, line: line}, '*');
                            return false;
                        };
                        try {
                            ${combinedJS}
                        } catch(err) {
                            window.parent.postMessage({type: 'ERROR', message: err.message}, '*');
                        }
                    <\/script>
                </body>
                </html>
            `;

            iframeDoc.open();
            iframeDoc.write(fullOutput);
            iframeDoc.close();

            document.getElementById('previewPane').classList.add('active');
            logToConsole("Đã biên dịch và chạy thành công 30 module!", "success");
        }

        function closePreview() {
            document.getElementById('previewPane').classList.remove('active');
        }

        // Nhận log và lỗi từ khung chạy hiển thị trực tiếp ra bảng console giao diện
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'ERROR') {
                logToConsole(`[LỖI SCRIPT]: ${event.data.message} (Dòng: ${event.data.line || 'N/A'})`, "error");
            }
        });

        function logToConsole(text, type = "normal") {
            const consoleBox = document.getElementById('error-console');
            let color = "#38bdf8";
            if (type === "error") color = "#ff5555";
            if (type === "success") color = "#22c55e";
            consoleBox.innerHTML += `<br><span style="color: ${color};">> ${text}</span>`;
            consoleBox.scrollTop = consoleBox.scrollHeight;
        }

        // Khởi chạy giao diện ban đầu
        renderFileList();
        openFile("index.html");
    </script>
</body>
    </html>
