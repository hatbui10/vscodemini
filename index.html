<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Công Cụ Sinh Code Dữ Liệu Học Sinh</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .converter-container {
            max-width: 700px;
            
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 { text-align: center; color: #007bff; margin-top: 0; }
        label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; }
        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
        }
        textarea { resize: vertical; }
        button {
            width: 100%;
            padding: 12px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.2s;
        }
        button:hover { background: #218838; }
        .result-box {
            position: relative;
            margin-top: 20px;
        }
        #outputCode {
            background: #272822;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 6px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9em;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
        }
        .btn-copy {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #007bff;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.8em;
            cursor: pointer;
            width: auto;
            margin: 0;
        }
        .btn-copy:hover { background: #0056b3; }
        .hint { font-size: 0.85em; color: #666; font-style: italic; }
    </style>
</head>
<body>

<div class="converter-container">
    <h2>🛠️ TOOL SINH CODE DỮ LIỆU</h2>
    
    <label for="maLop">Mã lớp (Ví dụ: 12A1, 12B2):</label>
    
    <select id="maLop">
            <option value="SKY-KID">SKY-KID  T2-237</option>
            <option value="CLOUD-KID">CLOUD-KID  T2-237</option>
            <option value="12A1">12A1</option>
            <option value="SMART-KID">SMART-KID  T2-237</option>
            <option value="OZON-L2+3/Ngô Hằng">OZON-L2+3/Ngô Hằng T3-158</option>
            <option value="MICKEY - L2+3/Thị Phương"> MICKEY - L2+3/Thị Phương T3-158   </option>
            <option value="OXFORD  L4/Thu Phương">OXFORD  L4/Thu Phương </option>
            <option value="QUEST L4 Thu Phương">QUEST L4 Thu Phương T3-158</option>
            <option value="CAMBRIDGE - L4/Nhung">CAMBRIDGE - L4/Nhung  T4-158</option>
            <option value="KING - L4/Thu Phương">KING - L4/Thu Phương</option>
            <option value="GALAXY - L4/Minh Phương">GALAXY - L4/Minh Phương</option>
            <option value="KIND L5 /Tân">KIND L5 /Tân</option>
            <option value="APOLLO L5/Yến ">APOLLO L5/Yến </option>
            <option value="LIKE L5/Thu Phương">LIKE L5/Thu Phương</option>
            <option value="SMILE-L6/Hà An">SMILE-L6/Hà An</option>
            <option value="STAR-L6/Thanh Thảo">STAR-L6/Thanh Thảo</option>
            <option value="GOOD-L6/ Hà An ">GOOD-L6/ Hà An </option>
            <option value="MARS - L6/Ngô Hằng">MARS - L6/Ngô Hằng</option>
            <option value="PARIS-L6/Minh Phương">PARIS-L6/Minh Phương</option>
            <option value="EVIC">EVIC</option>
            <option value="KID E7">KID E7</option>
            <option value="BOSS-VIP - L7/Lê Thu Hà">BOSS-VIP - L7/Lê Thu Hà</option>
            <option value="MOON-L7/Trà My">MOON-L7/Trà My</option>
            <option value="ILA-L7 - Thu Hà">ILA-L7 - Thu Hà</option>
            <option value="DELTA-L7 - Phương">DELTA-L7 - Phương</option>
            <option value="Happy - L8/Mai Ly">Happy - L8/Mai Ly</option>
            <option value="Sun - L8/Mai Ly">Sun - L8/Mai Ly</option>
            <option value="High - L8/Thu Hà">High - L8/Thu Hà</option>
            <option value="HOPE-L8 TRÀ MY">HOPE-L8 TRÀ MY</option>
            <option value="BIG-L9/Mai Ly">BIG-L9/Mai Ly</option>
            <option value="SUPER - Thu Hà - L9">SUPER - Thu Hà - L9</option>
            <option value="SEA - L9/Thu Hà">SEA - L9/Thu Hà</option>
            <option value="CLC-L9/Thu Hà">CLC-L9/Thu Hà</option>
            <option value="WIN - L10/Thu Hà">WIN - L10/Thu Hà</option>
            <option value="SMART - L10/Hà An">SMART - L10/Hà An</option>
            <option value="CLOUD - L10/Hà An">CLOUD - L10/Hà An</option>
            <option value="TRY - L10/Thu Hà">TRY - L10/Thu Hà</option>
            <option value="CAN - L11/Lê Thu Hà">CAN - L11/Lê Thu Hà</option>
            <option value="VICTORYA">VICTORYA</option>
            <option value="OCEAN-L11">OCEAN-L11</option>
            <option value="ATHENA-L12/Mai Ly">ATHENA-L12/Mai Ly</option>
            <option value="IELTS-WONDERFUL/Thu Hà">IELTS-WONDERFUL/Thu Hà</option>
            <option value="SPACEX">SPACEX</option>
            <option value="FUN - IE-L12/Lê Thu Hà">FUN - IE-L12/Lê Thu Hà</option>
            <option value="L12-BLUE">L12-BLUE</option>
            
        </select>

    <label for="inputData">Dán danh sách học sinh vào đây:</label>
    <p class="hint">Hỗ trợ định dạng Sao chép từ Excel hoặc Zalo dạng: "Tên_Học_Sinh [Khoảng_Trắng/Tab] Số_Điện_Thoại"</p>
    <textarea id="inputData" rows="10" placeholder="Nguyễn An Nhiên (Bơ)   039 696 3955&#10;Nguyễn Trung Đức (Bon)  033 980 4981"></textarea>

    <button onclick="chuyenDoiDuLieu()">BẤM ĐỂ SINH CODE JS</button>

    <div class="result-box">
        <label>Đoạn code kết quả:</label>
        <button class="btn-copy" onclick="copyCode()">Copy Code</button>
        <pre id="outputCode">// Code sinh ra sẽ nằm ở đây...</pre>
    </div>
</div>

<script>
    function chuyenDoiDuLieu() {
        const maLop = document.getElementById('maLop').value.trim() || "TEN_LOP";
        const rawText = document.getElementById('inputData').value;
        const lines = rawText.split('\n');
        
        let resultArr = [];
        let count = 1;

        lines.forEach(line => {
            if(!line.trim()) return; // Bỏ qua dòng trống

            // Tách tên và số điện thoại bằng dấu Tab hoặc khoảng trắng lớn (phù hợp khi copy từ Excel/Zalo)
            let parts = line.split(/\t+/); 
            if(parts.length < 2) {
                // Thử tách bằng khoảng trắng nếu không có dấu Tab công nghiệp
                parts = line.split(/ {2,}/);
            }

            let ten = parts[0] ? parts[0].trim() : "Chưa nhập tên";
            let sdt = parts[1] ? parts[1].trim() : "Không có SĐT";

            // Làm sạch số điện thoại (bỏ khoảng trắng thừa nếu có)
            sdt = sdt.replace(/\s+/g, '');

            // Tạo mã ID tự động dạng chữ: hs_12A1_01, hs_12A1_02...
            let prefixCount = count < 10 ? '0' + count : count;
            let customId = `hs_${maLop}_${prefixCount}`;

            resultArr.push(`        { id: "${customId}", ten: "${ten}", sdt: "${sdt}" }`);
            count++;
        });

        // Ghép thành chuỗi Object hoàn chỉnh
        let finalCode = `const dataHocSinh = {\n    "${maLop}": [\n${resultArr.join(',\n')}\n    ]\n};`;
        
        document.getElementById('outputCode').innerText = finalCode;
    }

    function copyCode() {
        const codeText = document.getElementById('outputCode').innerText;
        navigator.clipboard.writeText(codeText).then(() => {
            alert("Đã copy đoạn code thành công!");
        }).catch(err => {
            alert("Lỗi khi copy, bạn hãy bôi đen rồi copy thủ công nhé.");
        });
    }
</script>

</body>
</html>
