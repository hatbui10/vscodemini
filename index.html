<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini VS Code Mobile - Quản Lý Động CSS & JS</title>
    <style>
        :root {
            --bg-base: #1e1e1e;
            --sidebar-bg: #252526;
            --activity-bar: #333333;
            --tab-bg: #2d2d2d;
            --tab-active: #1e1e1e;
            --text-color: #d4d4d4;
            --accent-color: #007acc;
            --border-color: #3f3f46;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background-color: var(--activity-bar);
            padding: 8px 12px;
            font-size: 0.8rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-actions {
            display: flex;
            gap: 5px;
        }

        .btn-action {
            background-color: #333;
            color: white;
            border: 1px solid var(--border-color);
            padding: 5px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            cursor: pointer;
        }

        .btn-run {
            background-color: #2ea44f;
            border: none;
            font-weight: 600;
        }

        .workspace {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .sidebar {
            position: absolute;
            left: -100%;
            top: 0;
            width: 88%;
            max-width: 340px;
            height: 100%;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            z-index: 100;
            display: flex;
            flex-direction: column;
            transition: left 0.3s ease;
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-header {
            padding: 10px 12px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: bold;
            color: #969696;
            background: #2d2d2d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-toolbar {
            padding: 8px 10px;
            background: #222;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .sidebar-toolbar button {
            background: #2a2d2e;
            color: #d4d4d4;
            border: 1px solid #454545;
            padding: 4px 8px;
            font-size: 0.7rem;
            border-radius: 3px;
            cursor: pointer;
        }
        .sidebar-toolbar button:hover {
            background: #37373d;
        }

        .file-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
            padding: 5px 0;
        }

        .folder-group-header {
            padding: 8px 10px;
            font-size: 0.75rem;
            font-weight: bold;
            color: #c586c0;
            background: rgba(255,255,255,0.03);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .folder-actions-inline {
            display: flex;
            gap: 4px;
        }

        .folder-actions-inline button {
            background: transparent;
            border: none;
            color: #aaa;
            font-size: 0.75rem;
            cursor: pointer;
            padding: 2px 4px;
        }
        .folder-actions-inline button:hover {
            color: #fff;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }

        .file-item {
            padding: 7px 10px 7px 24px;
            font-size: 0.78rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.02);
        }

        .file-item:hover {
            background: rgba(255,255,255,0.03);
        }

        .file-item.active {
            background-color: #37373d;
            color: #ffffff;
            border-left: 3px solid var(--accent-color);
        }

        .file-delete-btn {
            background: none;
            border: none;
            color: #f87171;
            cursor: pointer;
            font-size: 0.75rem;
            padding: 2px 6px;
            opacity: 0.6;
        }
        .file-item:hover .file-delete-btn {
            opacity: 1;
        }

        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-base);
            overflow: hidden;
        }

        .tabs-bar {
            background-color: var(--sidebar-bg);
            display: flex;
            overflow-x: auto;
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
        }

        .tab {
            padding: 8px 14px;
            font-size: 0.8rem;
            background-color: var(--tab-bg);
            border-right: 1px solid var(--border-color);
            cursor: pointer;
            color: #969696;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .tab.active {
            background-color: var(--tab-active);
            color: #ffffff;
            border-top: 2px solid var(--accent-color);
        }

        .editor-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto; 
            position: relative;
        }

        textarea {
            width: 100%;
            min-height: 150%;
            background-color: var(--bg-base);
            color: var(--text-color);
            border: none;
            padding: 16px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95rem;
            resize: none;
            outline: none;
            line-height: 1.6;
            white-space: pre;
            overflow-x: auto;
        }

        textarea::-webkit-scrollbar, #analyzer-view::-webkit-scrollbar, .file-list::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        textarea::-webkit-scrollbar-thumb, #analyzer-view::-webkit-scrollbar-thumb, .file-list::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }
        textarea::-webkit-scrollbar-track, #analyzer-view::-webkit-scrollbar-track {
            background: #1e1e1e;
        }

        #analyzer-view {
            display: none;
            width: 100%;
            min-height: 150%;
            background: #1e1e1e;
            color: #38bdf8;
            padding: 20px;
            font-family: monospace;
            font-size: 0.85rem;
            overflow-y: auto; 
            overflow-x: auto;
            line-height: 1.6;
        }

        .preview-pane {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            z-index: 200;
            display: none;
            flex-direction: column;
        }

        .preview-pane.active {
            display: flex;
        }

        .preview-header {
            background-color: #f0f0f0;
            padding: 10px 14px;
            font-size: 0.85rem;
            color: #333;
            border-bottom: 1px solid #ddd;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #preview-iframe {
            flex: 1;
            border: none;
            width: 100%;
            height: 100%;
        }

        .console-panel {
            background-color: #121212;
            border-top: 1px solid var(--border-color);
            height: 90px;
            display: flex;
            flex-direction: column;
        }

        .console-header {
            background-color: #252526;
            padding: 4px 10px;
            font-size: 0.7rem;
            color: #9cdcfe;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        #error-console {
            flex: 1;
            background: #000;
            color: #38bdf8;
            padding: 6px 10px;
            font-family: monospace;
            font-size: 0.7rem;
            overflow-y: auto;
            line-height: 1.4;
        }

        .backdrop {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 90;
            display: none;
        }
        .backdrop.show {
            display: block;
        }
    </style>
</head>
<body>

    <header>
        <button class="btn-action" onclick="toggleSidebar()">📁 Quản Lý Tầng</button>
        <span id="currentFileName" style="font-size: 0.75rem; color: #9cdcfe;">index.html</span>
        <div class="header-actions">
            <button class="btn-action" onclick="downloadProject()" title="Tải code về máy">📥 Tải</button>
            <button class="btn-action btn-run" onclick="runProject()">▶ Chạy</button>
        </div>
    </header>

    <div class="workspace">
        <div class="backdrop" id="backdrop" onclick="toggleSidebar()"></div>

        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span>📁 Cấu Trúc CSS & JS</span>
                <span onclick="toggleSidebar()" style="font-size:1.1rem; cursor:pointer;">✕</span>
            </div>
            <div class="sidebar-toolbar">
                <button onclick="addNewTier()">➕ Thêm Tầng Mới</button>
            </div>
            <ul class="file-list" id="fileListUI"></ul>
        </div>

        <div class="editor-container">
            <div class="tabs-bar" id="tabsBarUI"></div>
            <div class="editor-pane">
                <textarea id="codeEditor" placeholder="Chọn file để chỉnh sửa..."></textarea>
                <div id="analyzer-view"></div>
            </div>
        </div>

        <div class="preview-pane" id="previewPane">
            <div class="preview-header">
                <span>🌐 Màn Hình Kết Quả</span>
                <button class="btn-action" style="background:#333;" onclick="closePreview()">✕ Đóng</button>
            </div>
            <iframe id="preview-iframe"></iframe>
        </div>
    </div>

    <div class="console-panel">
        <div class="console-header">
            <span>💻 Trạng Thái & Bắt Lỗi</span>
            <span style="cursor:pointer; color:#888;" onclick="document.getElementById('error-console').innerHTML='> Đã xóa log.'">🗑️ Xóa</span>
        </div>
        <div id="error-console">> Đã sẵn sàng. Bạn có thể thêm/xóa tùy ý cả file CSS và module JS cho từng tầng.</div>
    </div>

    <script>
        let projectTiers = JSON.parse(localStorage.getItem('my_project_tiers_v5')) || [1, 2, 3];
        let projectFiles = JSON.parse(localStorage.getItem('my_project_files_v5')) || {
            "index.html": { 
                type: "html", 
                content: '<div style="padding:20px; font-family:sans-serif; text-align:center;">\n    <h2>Hệ Thống CSS & JS Động</h2>\n    <p id="status-text" style="color:blue; margin-top:10px;">Đã sẵn sàng hoạt động!</p>\n</div>' 
            }
        };

        // Khởi tạo mặc định nếu chưa có file CSS hoặc JS cho các tầng
        projectTiers.forEach(tier => {
            let defaultCssKey = `css/tang${tier}/style1.css`;
            if (!Object.keys(projectFiles).some(f => f.startsWith(`css/tang${tier}/`))) {
                projectFiles[defaultCssKey] = { type: "css", content: `/* CSS Tầng ${tier} - style1.css */\n` };
            }
            if (!Object.keys(projectFiles).some(f => f.startsWith(`js/tang${tier}/`))) {
                projectFiles[`js/tang${tier}/module1.js`] = { type: "js", content: `// JS Tầng ${tier} - Module 1\n` };
            }
        });

        let currentActiveFile = "index.html";
        let openTabs = ["index.html"];
        const codeEditor = document.getElementById('codeEditor');
        const analyzerView = document.getElementById('analyzer-view');

        codeEditor.addEventListener('input', (e) => {
            if (projectFiles[currentActiveFile]) {
                projectFiles[currentActiveFile].content = e.target.value;
                saveData();
            }
        });

        function saveData() {
            localStorage.setItem('my_project_tiers_v5', JSON.stringify(projectTiers));
            localStorage.setItem('my_project_files_v5', JSON.stringify(projectFiles));
        }

        window.toggleSidebar = function() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('backdrop').classList.toggle('show');
        }

        function renderFileList() {
            const fileListUI = document.getElementById('fileListUI');
            fileListUI.innerHTML = '';
            
            // Nút Báo Cáo
            const analyzeLi = document.createElement('li');
            analyzeLi.className = `file-item ${currentActiveFile === 'ANALYZE_TOOL' ? 'active' : ''}`;
            analyzeLi.innerHTML = `📊 <span style="color:#38bdf8; font-weight:bold;">Báo Cáo Tổng Hợp</span>`;
            analyzeLi.onclick = () => { window.openAnalyzer(); window.toggleSidebar(); };
            fileListUI.appendChild(analyzeLi);

            // Gốc Root
            const rootHeader = document.createElement('div');
            rootHeader.className = 'folder-group-header';
            rootHeader.innerHTML = `<span>📁 Gốc (Root)</span>`;
            fileListUI.appendChild(rootHeader);

            const rootLi = document.createElement('li');
            rootLi.className = `file-item ${'index.html' === currentActiveFile ? 'active' : ''}`;
            rootLi.innerHTML = `🌐 <span>index.html</span>`;
            rootLi.onclick = () => { window.openFile('index.html'); window.toggleSidebar(); };
            fileListUI.appendChild(rootLi);

            // Các Tầng Động
            projectTiers.forEach(tier => {
                const groupHeader = document.createElement('div');
                groupHeader.className = 'folder-group-header';
                groupHeader.innerHTML = `
                    <span>📁 Tầng ${tier}</span>
                    <div class="folder-actions-inline">
                        <button onclick="event.stopPropagation(); addNewCss(${tier})" title="Thêm file CSS">➕ CSS</button>
                        <button onclick="event.stopPropagation(); addNewModule(${tier})" title="Thêm module JS">➕ JS</button>
                        <button onclick="event.stopPropagation(); deleteTier(${tier})" title="Xóa toàn bộ tầng này" style="color:#f87171;">🗑️</button>
                    </div>
                `;
                fileListUI.appendChild(groupHeader);

                // Hiển thị tất cả file CSS thuộc tầng này
                Object.keys(projectFiles).forEach(filename => {
                    if (filename.startsWith(`css/tang${tier}/`)) {
                        let cssName = filename.split('/').pop();
                        const cssLi = document.createElement('li');
                        cssLi.className = `file-item ${filename === currentActiveFile ? 'active' : ''}`;
                        cssLi.innerHTML = `
                            <span onclick="window.openFile('${filename}'); window.toggleSidebar();">🎨 ${cssName}</span>
                            <button class="file-delete-btn" onclick="event.stopPropagation(); deleteCssFile('${filename}')" title="Xóa file CSS này">✕</button>
                        `;
                        fileListUI.appendChild(cssLi);
                    }
                });

                // Hiển thị tất cả file JS thuộc tầng này
                Object.keys(projectFiles).forEach(filename => {
                    if (filename.startsWith(`js/tang${tier}/`)) {
                        let moduleName = filename.split('/').pop();
                        const jsLi = document.createElement('li');
                        jsLi.className = `file-item ${filename === currentActiveFile ? 'active' : ''}`;
                        jsLi.innerHTML = `
                            <span onclick="window.openFile('${filename}'); window.toggleSidebar();">⚡ ${moduleName}</span>
                            <button class="file-delete-btn" onclick="event.stopPropagation(); deleteModule('${filename}')" title="Xóa module JS này">✕</button>
                        `;
                        fileListUI.appendChild(jsLi);
                    }
                });
            });
        }

        // --- TÍNH NĂNG THÊM / XÓA TẦNG, CSS & MODULE JS ---
        window.addNewTier = function() {
            let newTier = projectTiers.length > 0 ? Math.max(...projectTiers) + 1 : 1;
            projectTiers.push(newTier);
            
            // Tạo sẵn 1 file CSS và 1 file JS cho tầng mới
            projectFiles[`css/tang${newTier}/style1.css`] = { type: "css", content: `/* CSS Tầng ${newTier} */\n` };
            projectFiles[`js/tang${newTier}/module1.js`] = { type: "js", content: `// JS Tầng ${newTier} - Module 1\n` };
            
            saveData();
            renderFileList();
            document.getElementById('error-console').innerHTML = `> Đã thêm Tầng ${newTier} thành công.`;
        }

        window.deleteTier = function(tier) {
            if (projectTiers.length <= 1) {
                alert("Cần giữ lại ít nhất 1 tầng!");
                return;
            }
            if (confirm(`Bạn có chắc muốn xóa toàn bộ Tầng ${tier} (gồm cả các file CSS và JS trong tầng)?`)) {
                // Xóa toàn bộ file CSS & JS thuộc tầng này
                Object.keys(projectFiles).forEach(filename => {
                    if (filename.startsWith(`css/tang${tier}/`) || filename.startsWith(`js/tang${tier}/`)) {
                        delete projectFiles[filename];
                        openTabs = openTabs.filter(t => t !== filename);
                    }
                });
                projectTiers = projectTiers.filter(t => t !== tier);
                
                saveData();
                if (!projectFiles[currentActiveFile]) {
                    window.openFile("index.html");
                } else {
                    renderFileList();
                }
            }
        }

        window.addNewCss = function(tier) {
            let existingCss = Object.keys(projectFiles).filter(f => f.startsWith(`css/tang${tier}/`));
            let nextIndex = existingCss.length + 1;
            while(projectFiles[`css/tang${tier}/style${nextIndex}.css`]) {
                nextIndex++;
            }
            
            let newFileName = `css/tang${tier}/style${nextIndex}.css`;
            projectFiles[newFileName] = { type: "css", content: `/* CSS Tầng ${tier} - style${nextIndex}.css */\n` };
            
            saveData();
            renderFileList();
            window.openFile(newFileName);
            window.toggleSidebar();
        }

        window.deleteCssFile = function(filename) {
            let totalCssFiles = Object.keys(projectFiles).filter(f => f.startsWith('css/')).length;
            if (totalCssFiles <= 1) {
                alert("Cần giữ lại ít nhất 1 file CSS trong hệ thống!");
                return;
            }
            if (confirm(`Xóa file CSS ${filename}?`)) {
                delete projectFiles[filename];
                openTabs = openTabs.filter(t => t !== filename);
                saveData();
                if (currentActiveFile === filename) {
                    window.openFile("index.html");
                } else {
                    renderFileList();
                }
            }
        }

        window.addNewModule = function(tier) {
            let existingModules = Object.keys(projectFiles).filter(f => f.startsWith(`js/tang${tier}/`));
            let nextIndex = existingModules.length + 1;
            while(projectFiles[`js/tang${tier}/module${nextIndex}.js`]) {
                nextIndex++;
            }
            
            let newFileName = `js/tang${tier}/module${nextIndex}.js`;
            projectFiles[newFileName] = { type: "js", content: `// JS Tầng ${tier} - Module ${nextIndex}\n` };
            
            saveData();
            renderFileList();
            window.openFile(newFileName);
            window.toggleSidebar();
        }

        window.deleteModule = function(filename) {
            let totalJsFiles = Object.keys(projectFiles).filter(f => f.startsWith('js/')).length;
            if (totalJsFiles <= 1) {
                alert("Cần giữ lại ít nhất 1 file JS trong hệ thống!");
                return;
            }
            if (confirm(`Xóa module ${filename}?`)) {
                delete projectFiles[filename];
                openTabs = openTabs.filter(t => t !== filename);
                saveData();
                if (currentActiveFile === filename) {
                    window.openFile("index.html");
                } else {
                    renderFileList();
                }
            }
        }

        function renderTabs() {
            const tabsBarUI = document.getElementById('tabsBarUI');
            tabsBarUI.innerHTML = '';
            openTabs.forEach(filename => {
                const tab = document.createElement('div');
                tab.className = `tab ${filename === currentActiveFile ? 'active' : ''}`;
                let displayName = filename === 'ANALYZE_TOOL' ? '📊 Phân Tích' : (filename.includes('/') ? filename.split('/').slice(-2).join('/') : filename);
                tab.innerHTML = `<span>${displayName}</span> <span onclick="event.stopPropagation(); window.closeTab('${filename}')" style="opacity:0.6">✕</span>`;
                tab.onclick = () => filename === 'ANALYZE_TOOL' ? window.openAnalyzer() : window.switchFile(filename);
                tabsBarUI.appendChild(tab);
            });
        }

        window.openFile = function(filename) {
            if (!openTabs.includes(filename)) openTabs.push(filename);
            currentActiveFile = filename;
            codeEditor.style.display = 'block';
            analyzerView.style.display = 'none';
            codeEditor.value = projectFiles[filename] ? projectFiles[filename].content : '';
            document.getElementById('currentFileName').innerText = filename;
            renderFileList();
            renderTabs();
        }

        window.switchFile = function(filename) {
            currentActiveFile = filename;
            codeEditor.style.display = 'block';
            analyzerView.style.display = 'none';
            codeEditor.value = projectFiles[filename] ? projectFiles[filename].content : '';
            document.getElementById('currentFileName').innerText = filename;
            renderFileList();
            renderTabs();
        }

        window.openAnalyzer = function() {
            currentActiveFile = 'ANALYZE_TOOL';
            if (!openTabs.includes('ANALYZE_TOOL')) openTabs.push('ANALYZE_TOOL');
            codeEditor.style.display = 'none';
            analyzerView.style.display = 'block';
            document.getElementById('currentFileName').innerText = 'Báo Cáo Tổng Hợp Tầng Động';

            let report = "<h3>📊 THÔNG TIN HỆ THỐNG ĐỘNG</h3><hr style='border-color:#444; margin:10px 0'>";
            report += `<b>Tổng số tầng đang hoạt động:</b> ${projectTiers.join(', ')}<br><br>`;
            projectTiers.forEach(tier => {
                let cssCount = Object.keys(projectFiles).filter(f => f.startsWith(`css/tang${tier}/`)).length;
                let jsCount = Object.keys(projectFiles).filter(f => f.startsWith(`js/tang${tier}/`)).length;
                report += `<b style='color:#eab308;'>🔹 Tầng ${tier}:</b> Số file CSS: ${cssCount} | Số module JS: ${jsCount}<br>`;
            });

            analyzerView.innerHTML = report;
            renderFileList();
            renderTabs();
        }

        window.closeTab = function(filename) {
            openTabs = openTabs.filter(f => f !== filename);
            if (openTabs.length === 0) openTabs.push("index.html");
            if (currentActiveFile === filename) {
                let next = openTabs[openTabs.length - 1];
                next === 'ANALYZE_TOOL' ? window.openAnalyzer() : window.switchFile(next);
            } else {
                renderTabs();
            }
        }

        window.runProject = function() {
            const iframe = document.getElementById('preview-iframe');
            const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;

            let finalHtml = projectFiles["index.html"] ? projectFiles["index.html"].content : '';
            
            // Gom tất cả CSS theo thứ tự các tầng và file CSS bên trong
            let combinedCSS = "";
            projectTiers.forEach(tier => {
                let cssFiles = Object.keys(projectFiles).filter(f => f.startsWith(`css/tang${tier}/`)).sort();
                cssFiles.forEach(cssKey => {
                    if(projectFiles[cssKey]) combinedCSS += `/* Tầng ${tier} - ${cssKey} */\n` + projectFiles[cssKey].content + "\n";
                });
            });
            
            // Gom tất cả JS theo thứ tự các tầng và module JS bên trong
            let combinedJS = "";
            projectTiers.forEach(tier => {
                let jsFiles = Object.keys(projectFiles).filter(f => f.startsWith(`js/tang${tier}/`)).sort();
                jsFiles.forEach(jsKey => {
                    if(projectFiles[jsKey]) combinedJS += `/* Tầng ${tier} - ${jsKey} */\n` + projectFiles[jsKey].content + "\n";
                });
            });

            const fullOutput = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${combinedCSS}</style></head><body>${finalHtml}<script>window.onerror=function(m,u,l){window.parent.postMessage({type:'ERROR',message:m,line:l},'*');};try{${combinedJS}}catch(e){window.parent.postMessage({type:'ERROR',message:e.message},'*');}<\/script></body></html>`;

            iframeDoc.open();
            iframeDoc.write(fullOutput);
            iframeDoc.close();
            document.getElementById('previewPane').classList.add('active');
        }

        window.closePreview = function() {
            document.getElementById('previewPane').classList.remove('active');
        }

        window.downloadProject = function() {
            let finalHtml = projectFiles["index.html"] ? projectFiles["index.html"].content : '';
            let combinedCSS = "";
            projectTiers.forEach(tier => {
                let cssFiles = Object.keys(projectFiles).filter(f => f.startsWith(`css/tang${tier}/`)).sort();
                cssFiles.forEach(cssKey => {
                    if(projectFiles[cssKey]) combinedCSS += `/* ${cssKey} */\n` + projectFiles[cssKey].content + "\n";
                });
            });
            
            let combinedJS = "";
            projectTiers.forEach(tier => {
                let jsFiles = Object.keys(projectFiles).filter(f => f.startsWith(`js/tang${tier}/`)).sort();
                jsFiles.forEach(jsKey => {
                    if(projectFiles[jsKey]) combinedJS += `/* ${jsKey} */\n` + projectFiles[jsKey].content + "\n";
                });
            });

            let bundleContent = `<!DOCTYPE html>\n<html lang="vi">\n<head>\n<meta charset="UTF-8">\n<style>\n${combinedCSS}\n</style>\n</head>\n<body>\n${finalHtml}\n<script>\n${combinedJS}\n<\/script>\n</body>\n</html>`;

            let blob = new Blob([bundleContent], { type: 'text/html' });
            let a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'index.html';
            a.click();
        }

        renderFileList();
        window.openFile("index.html");
    </script>
</body>
</html>
